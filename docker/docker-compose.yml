networks:
  backend:
    driver: bridge

services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: helpdesk
      POSTGRES_USER: helpdesk
      POSTGRES_PASSWORD: helpdesk
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U helpdesk"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - backend

  test:
    build:
      context: ..
      dockerfile: backend/Dockerfile
      target: gobuilder
    depends_on:
      db:
        condition: service_healthy
    environment:
      TEST_DATABASE_URL: postgres://helpdesk:helpdesk@db:5432/helpdesk?sslmode=disable
    working_dir: /build
    command: go test ./...
    profiles:
      - test
    networks:
      - backend

  app:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://helpdesk:helpdesk@db:5432/helpdesk?sslmode=disable
      BASE_URL: ${BASE_URL:-http://localhost:8080}
      SESSION_SECRET: ${SESSION_SECRET}
      JWT_SECRET: ${JWT_SECRET}
      HTTP_PORT: 8080
      # Optional — set in .env to enable email notifications
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      # Optional — set in .env to enable features
      GUEST_SUBMISSION_ENABLED: ${GUEST_SUBMISSION_ENABLED:-false}
      SLA_ENABLED: ${SLA_ENABLED:-false}
      MFA_ENABLED: ${MFA_ENABLED:-false}
    volumes:
      - ./data/attachments:/data/attachments
    networks:
      - backend

version: "2"
sql:
  - engine: "postgresql"
    queries: "queries/"
    schema: "internal/database/migrations/"
    gen:
      go:
        package: "dbgen"
        out: "internal/dbgen"
        emit_interface: true
        emit_json_tags: true
        emit_pointers_for_null_types: true
        overrides:
          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              package: "uuid"
              type: "UUID"
          - db_type: "uuid"
            nullable: true
            go_type:
              import: "github.com/google/uuid"
              package: "uuid"
              type: "NullUUID"
          - db_type: "text[]"
            go_type:
              type: "[]string"

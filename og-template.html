<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: #f8fafc;
    background:
      radial-gradient(ellipse 50% 70% at 20% 20%, rgba(96, 165, 250, 0.45) 0%, transparent 60%),
      radial-gradient(ellipse 60% 80% at 90% 110%, rgba(129, 140, 248, 0.55) 0%, transparent 60%),
      linear-gradient(135deg, #1e3a8a 0%, #1d4ed8 45%, #2563eb 100%);
    overflow: hidden;
    position: relative;
  }

  /* Subtle grid pattern overlay for texture */
  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  .content {
    position: absolute;
    top: 56px;
    left: 72px;
    width: 580px;
    z-index: 2;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    font-weight: 600;
    color: #dbeafe;
    background: rgba(255, 255, 255, 0.12);
    border: 1px solid rgba(255, 255, 255, 0.25);
    padding: 7px 14px;
    border-radius: 999px;
    letter-spacing: 0.03em;
    margin-bottom: 28px;
    backdrop-filter: blur(8px);
  }

  .badge-dot {
    width: 7px;
    height: 7px;
    background: #93c5fd;
    border-radius: 50%;
    box-shadow: 0 0 10px rgba(147, 197, 253, 0.8);
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 26px;
  }

  .logo {
    width: 64px;
    height: 64px;
    background: #ffffff;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 12px 32px -8px rgba(0, 0, 0, 0.4);
  }

  .wordmark {
    font-size: 40px;
    font-weight: 800;
    letter-spacing: -0.02em;
    color: #ffffff;
  }

  h1 {
    font-size: 56px;
    font-weight: 800;
    line-height: 1.02;
    letter-spacing: -0.025em;
    color: #ffffff;
    margin-bottom: 22px;
  }

  h1 .accent {
    background: linear-gradient(90deg, #bae6fd 0%, #93c5fd 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  p.tag {
    font-size: 19px;
    line-height: 1.45;
    color: #cbd5e1;
    max-width: 540px;
    margin-bottom: 30px;
  }

  .pills {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    max-width: 540px;
  }

  .pill {
    font-size: 14px;
    font-weight: 600;
    color: #e0e7ff;
    background: rgba(255, 255, 255, 0.10);
    border: 1px solid rgba(255, 255, 255, 0.22);
    padding: 8px 14px;
    border-radius: 8px;
    backdrop-filter: blur(4px);
  }

  .browser {
    position: absolute;
    top: 100px;
    right: -60px;
    width: 640px;
    background: #fff;
    border-radius: 14px;
    box-shadow:
      0 60px 120px -20px rgba(0, 0, 0, 0.55),
      0 24px 48px -16px rgba(0, 0, 0, 0.35);
    overflow: hidden;
    transform: rotate(-4deg);
    z-index: 1;
  }

  .browser-bar {
    background: #f8fafc;
    border-bottom: 1px solid #e2e8f0;
    padding: 11px 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .dot { width: 11px; height: 11px; border-radius: 50%; }
  .dot.r { background: #f87171; }
  .dot.y { background: #fbbf24; }
  .dot.g { background: #4ade80; }

  .browser img {
    display: block;
    width: 100%;
    height: auto;
  }

  .footer {
    position: absolute;
    bottom: 28px;
    left: 72px;
    right: 72px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 14px;
    color: #cbd5e1;
    font-weight: 600;
    z-index: 3;
    letter-spacing: 0.02em;
  }

  .footer .domain { color: #bfdbfe; }
</style>
</head>
<body>

  <div class="browser">
    <div class="browser-bar">
      <span class="dot r"></span>
      <span class="dot y"></span>
      <span class="dot g"></span>
    </div>
    <img src="screenshots/02-dashboard.png" alt="Dashboard" />
  </div>

  <div class="content">
    <span class="badge"><span class="badge-dot"></span> v1.0.0 &nbsp;·&nbsp; Open source · AGPL v3</span>

    <div class="brand">
      <div class="logo">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#2563eb" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
      </div>
      <div class="wordmark">Go Help Desk</div>
    </div>

    <h1>Self-hosted<br/>support <span class="accent">ticketing</span>.</h1>

    <p class="tag">Single Go binary. PostgreSQL. Docker Compose. Your data stays on your infrastructure.</p>

    <div class="pills">
      <span class="pill">SAML SSO</span>
      <span class="pill">TOTP MFA</span>
      <span class="pill">SLA tracking</span>
      <span class="pill">REST API</span>
      <span class="pill">MCP server</span>
      <span class="pill">WASM plugins</span>
    </div>
  </div>

  <div class="footer">
    <span class="domain">gohelpdesk.org</span>
    <span>github.com/PubliciaLLC/go-help-desk</span>
  </div>

</body>
</html>

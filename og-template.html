<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: #0f172a;
    background:
      radial-gradient(circle at 0% 0%, #eff6ff 0%, transparent 45%),
      radial-gradient(circle at 100% 100%, #e0e7ff 0%, transparent 50%),
      #ffffff;
    display: grid;
    grid-template-columns: 1fr 1fr;
    align-items: center;
    padding: 64px 72px;
    overflow: hidden;
    position: relative;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 15px;
    font-weight: 600;
    color: #2563eb;
    background: #eff6ff;
    border: 1px solid #bfdbfe;
    padding: 7px 14px;
    border-radius: 999px;
    letter-spacing: 0.02em;
    margin-bottom: 28px;
  }

  .badge-dot {
    width: 7px;
    height: 7px;
    background: #2563eb;
    border-radius: 50%;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 24px;
  }

  .logo {
    width: 72px;
    height: 72px;
    background: #2563eb;
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 10px 30px -10px rgba(37, 99, 235, 0.5);
  }

  .wordmark {
    font-size: 42px;
    font-weight: 800;
    letter-spacing: -0.02em;
    color: #0f172a;
  }

  h1 {
    font-size: 54px;
    font-weight: 800;
    line-height: 1.05;
    letter-spacing: -0.025em;
    color: #0f172a;
    margin-bottom: 20px;
  }

  h1 .accent { color: #2563eb; }

  p.tag {
    font-size: 20px;
    line-height: 1.45;
    color: #334155;
    max-width: 480px;
    margin-bottom: 32px;
  }

  .pills {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    max-width: 500px;
  }

  .pill {
    font-size: 14px;
    font-weight: 600;
    color: #334155;
    background: #fff;
    border: 1px solid #e2e8f0;
    padding: 8px 14px;
    border-radius: 8px;
    box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04);
  }

  .right {
    position: relative;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: flex-end;
  }

  .browser {
    width: 560px;
    background: #fff;
    border-radius: 12px;
    box-shadow:
      0 30px 60px -20px rgba(15, 23, 42, 0.25),
      0 12px 24px -12px rgba(15, 23, 42, 0.15);
    border: 1px solid #e2e8f0;
    overflow: hidden;
    transform: rotate(-2deg);
  }

  .browser-bar {
    background: #f8fafc;
    border-bottom: 1px solid #e2e8f0;
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .dot { width: 10px; height: 10px; border-radius: 50%; }
  .dot.r { background: #f87171; }
  .dot.y { background: #fbbf24; }
  .dot.g { background: #4ade80; }

  .browser img {
    display: block;
    width: 100%;
    height: auto;
  }

  .footer {
    position: absolute;
    bottom: 32px;
    left: 72px;
    right: 72px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 15px;
    color: #64748b;
    font-weight: 600;
  }

  .footer .domain { color: #2563eb; }
</style>
</head>
<body>

  <div class="left">
    <span class="badge"><span class="badge-dot"></span> v1.0.0 &nbsp;·&nbsp; Open source · AGPL v3</span>

    <div class="brand">
      <div class="logo">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
      </div>
      <div class="wordmark">Go Help Desk</div>
    </div>

    <h1>Self-hosted<br/>support <span class="accent">ticketing</span>.</h1>

    <p class="tag">Single Go binary. PostgreSQL. Docker Compose. Your data stays on your infrastructure.</p>

    <div class="pills">
      <span class="pill">SAML SSO</span>
      <span class="pill">TOTP MFA</span>
      <span class="pill">SLA tracking</span>
      <span class="pill">REST API</span>
      <span class="pill">MCP server</span>
      <span class="pill">WASM plugins</span>
    </div>
  </div>

  <div class="right">
    <div class="browser">
      <div class="browser-bar">
        <span class="dot r"></span>
        <span class="dot y"></span>
        <span class="dot g"></span>
      </div>
      <img src="screenshots/02-dashboard.png" alt="Dashboard" />
    </div>
  </div>

  <div class="footer">
    <span class="domain">gohelpdesk.org</span>
    <span>github.com/PubliciaLLC/go-help-desk</span>
  </div>

</body>
</html>
